<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Reels UI</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="js/app.js" defer></script>
</head>
<body style="background: #000; color: #fff;">
  <div class="app-container" style="background: #000;">
    
    <!-- Desktop Sidebar (Dark forced for Reels) -->
    <div class="sidebar" style="background: #000; border-right: 1px solid #262626;">
      <a href="index.html" class="logo" style="color: #fff;">Instagram</a>
      <div class="sidebar-nav">
        <a href="index.html" class="sidebar-item" style="color: #fff;">
          <i class="ph ph-house"></i> Home
        </a>
        <a href="explore.html" class="sidebar-item" style="color: #fff;">
          <i class="ph ph-magnifying-glass"></i> Search
        </a>
        <a href="explore.html" class="sidebar-item" style="color: #fff;">
          <i class="ph ph-compass"></i> Explore
        </a>
        <a href="reels.html" class="sidebar-item" style="font-weight: 700; color: #fff;">
          <i class="ph-fill ph-film-strip"></i> Reels
        </a>
        <a href="messages.html" class="sidebar-item" style="color: #fff;">
          <i class="ph ph-paper-plane-tilt"></i> Messages
        </a>
        <a href="notifications.html" class="sidebar-item" style="color: #fff;">
          <i class="ph ph-heart"></i> Notifications
        </a>
        <a href="#" class="sidebar-item create-btn" style="color: #fff;">
          <i class="ph ph-plus-square"></i> Create
        </a>
        <a href="profile.html" class="sidebar-item" style="color: #fff;">
          <img src="profile-pic.png" class="nav-profile" alt="Profile">
          Profile
        </a>
        <a href="#" class="sidebar-item theme-toggle" style="margin-top: auto; color: #fff;">
          <i class="ph ph-moon"></i> Theme
        </a>
        <a href="#" class="sidebar-item" style="color: #fff;">
          <i class="ph ph-list"></i> More
        </a>
      </div>
    </div>

    <!-- Content -->
    <div class="content" style="background: #000; padding-bottom: 0;">
      <div class="reels-container">
        
        <!-- Reel 1 -->
        <div class="reel-wrapper">
          <img class="reel-video" src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Video">
          <div class="reel-overlay">
            <div class="reel-info">
              <div class="reel-user">
                <img class="reel-avatar" src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80" alt="">
                <span>design_inspo</span>
                <button style="background: transparent; color: #fff; border: 1px solid #fff; border-radius: 4px; padding: 2px 8px; font-weight: 600; cursor: pointer; margin-left: 10px;">Follow</button>
              </div>
              <p style="font-size: 14px; margin-bottom: 10px;">Designing the perfect workspace. ✨ #design #interior</p>
              <div style="font-size: 12px; display: flex; align-items: center; gap: 5px;">
                <i class="ph-fill ph-music-note"></i> Original Audio
              </div>
            </div>
            <div class="reel-actions">
              <div class="reel-action-item">
                <i class="like-btn ph ph-heart"></i>
                <span class="likes-count">124K</span>
              </div>
              <div class="reel-action-item">
                <i class="ph ph-chat-circle"></i>
                <span>1,200</span>
              </div>
              <div class="reel-action-item">
                <i class="ph ph-paper-plane-tilt"></i>
              </div>
              <div class="reel-action-item">
                <i class="ph ph-dots-three"></i>
              </div>
              <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80" style="width: 28px; height: 28px; border-radius: 4px; object-fit: cover; border: 2px solid white; margin-top: 10px;">
            </div>
          </div>
        </div>

        <!-- Reel 2 -->
        <div class="reel-wrapper">
          <img class="reel-video" src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Video">
          <div class="reel-overlay">
            <div class="reel-info">
              <div class="reel-user">
                <img class="reel-avatar" src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80" alt="">
                <span>arch_daily</span>
                <button style="background: transparent; color: #fff; border: 1px solid #fff; border-radius: 4px; padding: 2px 8px; font-weight: 600; cursor: pointer; margin-left: 10px;">Follow</button>
              </div>
              <p style="font-size: 14px; margin-bottom: 10px;">Look at this amazing structure! 🏙️ #architecture</p>
              <div style="font-size: 12px; display: flex; align-items: center; gap: 5px;">
                <i class="ph-fill ph-music-note"></i> arch_daily • Original Audio
              </div>
            </div>
            <div class="reel-actions">
              <div class="reel-action-item">
                <i class="like-btn ph ph-heart"></i>
                <span class="likes-count">45K</span>
              </div>
              <div class="reel-action-item">
                <i class="ph ph-chat-circle"></i>
                <span>400</span>
              </div>
              <div class="reel-action-item">
                <i class="ph ph-paper-plane-tilt"></i>
              </div>
              <div class="reel-action-item">
                <i class="ph ph-dots-three"></i>
              </div>
              <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80" style="width: 28px; height: 28px; border-radius: 4px; object-fit: cover; border: 2px solid white; margin-top: 10px;">
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Bottom Navigation (Mobile) -->
    <div class="bottom-nav" style="background: #000; border-top: 1px solid #262626;">
      <a href="index.html" style="color: #fff;"><i class="ph ph-house"></i></a>
      <a href="explore.html" style="color: #fff;"><i class="ph ph-magnifying-glass"></i></a>
      <a href="#" class="create-btn" style="color: #fff;"><i class="ph ph-plus-square"></i></a>
      <a href="reels.html" style="color: #fff;"><i class="ph-fill ph-film-strip"></i></a>
      <a href="profile.html"><img src="profile-pic.png" class="nav-profile" alt=""></a>
    </div>
  </div>
</body>
</html>
